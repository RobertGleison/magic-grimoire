name: Docs Sync

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR diff
        id: pr-diff
        run: |
          git diff origin/main~1 origin/main -- . > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Sync docs with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A pull request was just merged into main. Your job is to keep the project documentation accurate and up-to-date.

            ## PR Details
            - **Title:** ${{ github.event.pull_request.title }}
            - **Description:** ${{ github.event.pull_request.body }}
            - **Author:** ${{ github.event.pull_request.user.login }}
            - **Merged at:** ${{ github.event.pull_request.merged_at }}
            - **PR number:** #${{ github.event.pull_request.number }}

            ## What to do

            ### 1. Read the diff
            Read the file `/tmp/pr.diff` to understand what changed in this PR.

            ### 2. Update CLAUDE.md if needed
            Read `CLAUDE.md`. If the PR changed any of the following, update the relevant section:
            - Tech stack (frameworks, libraries, tools, versions)
            - Project structure (new folders, renamed modules, removed services)
            - Key patterns or conventions (new async rules, new DTOs, new cache keys, etc.)
            - Infrastructure (new services, changed ports, new env vars)
            - Auth or security model

            Only update what actually changed. Do not rewrite sections unrelated to this PR.

            ### 3. Update README.md if needed
            Read `README.md`. Update only if:
            - Setup steps changed (new env vars, new services, different commands)
            - Service URLs or ports changed
            - Prerequisites changed

            ### 4. Add a LEARNINGS entry
            Read `docs/LEARNINGS.md`. Append a new entry at the top of the "Entries" section using this format:

            ```markdown
            ## [{PR title}](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}) — {YYYY-MM-DD}

            **Problem:** {what was broken, missing, or needed — inferred from the diff and PR description}

            **Solution:** {what was done to fix or implement it}

            **Context:** {why this approach was chosen; any gotchas, trade-offs, or non-obvious decisions a future debugger should know}

            **Files touched:** {comma-separated list of the most relevant changed files}

            ---
            ```

            Always add the LEARNINGS entry, even for small PRs. If the PR is purely cosmetic (typo fix, whitespace), keep the entry brief.

            ### 5. Commit the changes
            After making all updates, commit any changed files with:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CLAUDE.md README.md docs/LEARNINGS.md
            git diff --cached --quiet || git commit -m "docs: sync after PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
            git push
            ```

            ## Rules
            - Never invent changes. Only document what the diff actually shows.
            - If a section of CLAUDE.md or README.md is accurate after the PR, leave it alone.
            - Keep existing formatting and style consistent with the rest of the file.
            - The LEARNINGS entry should be useful to a future developer debugging a similar issue — not a commit message summary.
