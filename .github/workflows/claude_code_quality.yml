name: Claude Code Quality Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-quality-review:
    if: |
      github.event.issue.pull_request &&
      github.event.comment.body == '/code-quality'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Quality Review
        id: claude-quality-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }}

            Focus exclusively on code quality patterns. Review the changed files and flag any violations or improvement opportunities in the following areas:

            **SOLID Principles**
            - Single Responsibility: classes/functions doing more than one thing
            - Open/Closed: logic that requires modifying existing code to extend behavior
            - Liskov Substitution: subtypes that break parent contracts
            - Interface Segregation: fat interfaces or unused dependencies
            - Dependency Inversion: high-level modules depending on concrete implementations

            **ENUMs**
            - Magic strings or numbers that should be ENUMs
            - Inconsistent use of existing ENUMs (e.g., task/deck status values: queued, processing, completed, failed)

            **Early Returns / Guard Clauses**
            - Deeply nested conditionals that could be flattened with early returns
            - Missing guard clauses for invalid states or edge cases

            **React Re-renders (frontend/)**
            - Missing or incorrect React.memo, useMemo, useCallback
            - Objects or arrays created inline in JSX that cause unnecessary re-renders
            - useEffect with missing or overly broad dependency arrays
            - State updates that trigger cascading re-renders

            **Naming**
            - Variables, functions, and classes with vague or misleading names (e.g., data, temp, handle, flag)
            - Boolean names that don't read as a predicate (prefer is_, has_, can_, should_)
            - Functions named after implementation rather than intent
            - Inconsistent naming conventions within the same file or module

            **Tests**
            - Social tests (integration) vs isolated tests (unit) used in the wrong context — prefer social tests for behavior, isolated for pure logic
            - Test parameters that don't cover edge cases, boundary values, or failure paths
            - Missing tests for critical paths: deck generation pipeline steps, SSE streaming, auth middleware, Redis cache hits/misses
            - Tests asserting implementation details instead of behavior
            - Duplicate tests or tests that add no new coverage


            **Complexity / Big-O**
            - Nested loops or repeated lookups that could be O(n) with a dict/set
            - Unnecessary full-list scans where an early exit is possible
            - N+1 query patterns (e.g., fetching cards one by one instead of in batch)
            - Unbounded operations on user-supplied input without pagination or limits

            **Null / None Safety**
            - Unguarded attribute access on values that could be None (e.g., ORM relations, optional fields, API responses)
            - Missing checks before indexing lists or dicts from external data
            - Pydantic optional fields used without None guards downstream
            - Async results (e.g., db.scalar(), cache.get()) assumed to be non-None without validation

            **Security**
            - Unsanitized user input passed to queries, shell commands, or external APIs
            - JWT claims used without validation (e.g., trusting user_id from payload without verifying signature)
            - Secrets or API keys hardcoded or logged
            - Overly permissive CORS, auth bypass risks, or missing rate limiting on sensitive endpoints
            - Exposed internal error details in API responses

            **Resource Consumption**
            - Missing connection pool limits or unbounded DB/Redis connections
            - Large payloads loaded fully into memory (e.g., full Scryfall results) instead of streamed or paginated
            - Celery tasks with no timeout or retry limit that could hang indefinitely
            - Redis keys written without TTL
            - Missing cleanup for long-lived resources (DB sessions, HTTP clients, file handles)

            **Type Hints**
            - Missing or incorrect type hints on function signatures (Python and TypeScript)
            - Use of Any where a specific type is knowable
            - Pydantic models with fields typed too broadly (e.g., str instead of a Literal or Enum)
            - TypeScript props or return types left as implicit any or untyped

            **Folder Structure & Architecture**
            - Business logic leaking into routes/controllers instead of living in services
            - ORM models exposed directly in API responses instead of going through DTOs
            - Cross-layer imports (e.g., a service importing from routes, a model importing from services)
            - Files doing too much — a single module mixing DB access, business logic, and HTTP concerns
            - New features placed in the wrong layer (e.g., Scryfall logic outside scryfall_service.py, deck logic outside decks/)
            - Frontend: data fetching or business logic inside UI components instead of hooks or service modules
            - Shared utilities that belong to a specific domain placed in a generic folder, or vice versa
            - functions that can be splitted because do so much things
