

name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        if: env.HAS_ANTHROPIC_KEY == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }}'
          claude_args: '--allowed-tools Bash,Edit,Read,Write,Glob,Grep,mcp__github__create_pull_request_review,mcp__github__create_issue_comment,mcp__github__list_pull_requests,mcp__github__get_pull_request,mcp__github__list_pull_request_files,mcp__github__update_pull_request_review,mcp__github__get_issue,mcp__github__list_issues,mcp__github__get_file_contents --max-turns 10 --model claude-haiku-4-5-20251001'

